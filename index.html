// ───── CPUのターン ─────
function cpuTurn(playerIdx) {
  const p = state.players[playerIdx];
  // CPUのロジック：単純に手牌+ツモ牌から、最も持ってる文字が少ない（孤立した）牌を捨てる
  const allTiles = [...p.hand];
  if (p.drawn) allTiles.push(p.drawn);

  // 各文字の出現数カウント
  const charCount = {};
  allTiles.forEach(t => charCount[t.c] = (charCount[t.c]||0)+1);

  // 「ー」「っ」「ん」「ゃ」「ゅ」「ょ」など単独で使いにくい文字を優先で捨てる
  const lonelyChars = ['ー','っ','ん','ゃ','ゅ','ょ'];

  // 捨てる候補：
  // 1) 単独（charCount === 1）の中から、lonelyCharsを優先
  // 2) なければ単独の中からランダム
  // 3) すべて2個以上ある場合 → 一番多い文字以外から1個

  let candidates = allTiles.filter(t => charCount[t.c] === 1);
  let lonely = candidates.filter(t => lonelyChars.includes(t.c));
  let pick;
  if (lonely.length > 0) {
    pick = lonely[Math.floor(Math.random()*lonely.length)];
  } else if (candidates.length > 0) {
    pick = candidates[Math.floor(Math.random()*candidates.length)];
  } else {
    // ツモ牌があればツモ牌を捨てる
    pick = p.drawn || allTiles[Math.floor(Math.random()*allTiles.length)];
  }

  // CPUは上がらない仕様 → ツモ上がり判定なし

  // 牌を捨てる
  if (p.drawn && pick.id === p.drawn.id) {
    p.drawn = null;
  } else {
    const idx = p.hand.findIndex(t => t.id === pick.id);
    if (idx >= 0) p.hand.splice(idx, 1);
    if (p.drawn) {
      p.hand.push(p.drawn);
      p.drawn = null;
      sortHand(p);
    }
  }
  doDiscard(playerIdx, pick);
}

// ───── 上がり画面 ─────
function showWinScreen(playerIdx, kind) {
  const winner = state.players[playerIdx];
  const isYou = playerIdx === state.myIdx;

  let allWords = winner.melds.map(m => m.tiles.map(t=>t.c).join(''));
  if (isYou && winBuilder) {
    allWords = allWords.concat(winBuilder.groups.map(g => g.tiles.map(t=>t.c).join('')));
  } else {
    // CPUの場合は表示用の構成を再構築
    const allTiles = [...winner.hand];
    if (winner.drawn) allTiles.push(winner.drawn);
    const need3 = 4 - winner.melds.length;
    let pos = 0;
    for (let i = 0; i < need3; i++) {
      allWords.push(allTiles.slice(pos, pos+3).map(t=>t.c).join(''));
      pos += 3;
    }
    allWords.push(allTiles.slice(pos, pos+2).map(t=>t.c).join(''));
  }

  let html = `
    <div class="win-screen">
      <h2>${kind === 'tsumo' ? 'ツ モ 上 が り' : 'ロ ン 上 が り'}</h2>
      <div class="stamp">和 了</div>
      <div class="winner-name">${winner.name} の 勝 利！</div>
      <div class="win-words">
  `;
  allWords.forEach(w => { html += `<div class="win-word">${w}</div>`; });
  html += `
      </div>
      <div class="modal-actions" style="justify-content:center;">
        <button class="action-btn" onclick="returnToTitle()">タイトルへ</button>
        <button class="action-btn primary" onclick="restartGame()">もう一度</button>
      </div>
    </div>
  `;
  showModalWithHTML(html);
}

// ───── 上がり画面（既知の単語リストで表示） ─────
function showWinScreenWithWords(playerIdx, kind, words) {
  const winner = state.players[playerIdx];
  let html = `
    <div class="win-screen">
      <h2>${kind === 'tsumo' ? 'ツ モ 上 が り' : 'ロ ン 上 が り'}</h2>
      <div class="stamp">和 了</div>
      <div class="winner-name">${winner.name} の 勝 利！</div>
      <div class="win-words">
  `;
  words.forEach(w => { html += `<div class="win-word">${w}</div>`; });
  html += `
      </div>
      <div class="modal-actions" style="justify-content:center;">
        <button class="action-btn" onclick="returnToTitle()">タイトルへ</button>
        <button class="action-btn primary" onclick="restartGame()">もう一度</button>
      </div>
    </div>
  `;
  showModalWithHTML(html);
}

// ───── 振り返り画面（友人対戦の上がり後、全プレイヤーの手牌可視化） ─────
function showReviewScreen(reviewData) {
  // 各プレイヤーのスロット構成を表示
  // メルド数によりスロット数が変わる：need3 = 4 - melds, need2 = 1
  let html = `
    <div class="win-screen" style="text-align:left;">
      <h2 style="text-align:center;">${reviewData.kind === 'tsumo' ? 'ツ モ' : 'ロ ン'} 上 が り ！</h2>
      <div style="text-align:center;margin-bottom:1rem;">
        <div class="winner-name" style="font-size:1.4rem;">${reviewData.players[reviewData.winnerIdx].name} の勝利</div>
      </div>
      <div style="font-size:.9rem;color:#666;text-align:center;letter-spacing:.15em;margin-bottom:.8rem;">━ 全 員 の 手 牌 振 り 返 り ━</div>
  `;
  reviewData.players.forEach((p, i) => {
    const isWinner = (i === reviewData.winnerIdx);
    // メルド表示
    let meldsHtml = '';
    if (p.melds && p.melds.length > 0) {
      meldsHtml = `
        <div class="review-section-label">ポン公開牌</div>
        <div class="review-tile-row">
          ${p.melds.map(m => `
            <div class="review-group meld">
              ${m.map(t => `<div class="tile med">${t.c}</div>`).join('')}
            </div>
          `).join('')}
        </div>
      `;
    }

    // 手牌をslotIdごとにグルーピング
    const groupOrder = ['g0','g1','g2','g3','g4'];
    const tilesBySlot = {};
    groupOrder.forEach(s => tilesBySlot[s] = []);
    const poolTiles = [];
    p.hand.forEach(t => {
      const sid = t.slotId || 'pool';
      if (groupOrder.includes(sid)) {
        tilesBySlot[sid].push(t);
      } else {
        poolTiles.push(t);
      }
    });

    // メルド数に応じて表示するスロット数を決定
    const need3 = 4 - (p.melds ? p.melds.length : 0);
    const slotsToShow = [];
    for (let k = 0; k < need3; k++) slotsToShow.push({ id: `g${k}`, cap: 3 });
    slotsToShow.push({ id: 'g4', cap: 2 });

    let slotsHtml = '';
    if (slotsToShow.length > 0) {
      slotsHtml = `
        <div class="review-section-label">スロット振り分け（${need3}×3 + 1×2）</div>
        <div class="review-tile-row">
          ${slotsToShow.map(s => {
            const tiles = tilesBySlot[s.id] || [];
            const empty = Math.max(0, s.cap - tiles.length);
            return `
              <div class="review-group">
                ${tiles.map(t => `<div class="tile med">${t.c}</div>`).join('')}
                ${Array(empty).fill(0).map(()=>'<div class="review-empty-slot"></div>').join('')}
              </div>
            `;
          }).join('')}
        </div>
      `;
    }

    // 余剰牌
    let poolHtml = '';
    if (poolTiles.length > 0) {
      poolHtml = `
        <div class="review-section-label">余剰牌</div>
        <div class="review-tile-row">
          ${poolTiles.map(t => `<div class="tile med">${t.c}</div>`).join('')}
        </div>
      `;
    } else if (slotsToShow.length === 0 && (!p.melds || p.melds.length === 0)) {
      poolHtml = `<div style="font-size:.85rem;color:#888;">手牌なし</div>`;
    }

    html += `
      <div class="review-player${isWinner?' winner':''}">
        <div class="review-player-header">
          ${p.name}
          ${isWinner ? '<span class="review-winner-badge">勝 者</span>' : ''}
        </div>
        ${meldsHtml}
        ${slotsHtml}
        ${poolHtml}
      </div>
    `;
  });

  html += `
      <div class="modal-actions" style="justify-content:center;margin-top:.8rem;">
        <button class="action-btn" onclick="returnToTitle()">終 了</button>
        <button class="action-btn primary" id="rematchBtn" onclick="requestRematch()">再 戦</button>
      </div>
      <div class="review-rematch-status" id="rematchStatus"></div>
    </div>
  `;

  showModalWithHTMLClass(html, 'review-modal');
  // 再戦データを保持（再戦時の再レンダー用）
  window._lastReviewData = reviewData;
  window._myRematchClicked = false;
}

// クラス指定可能なモーダル表示
function showModalWithHTMLClass(html, modalClass) {
  const modalContent = document.getElementById('modalContent');
  modalContent.className = 'modal' + (modalClass ? ' ' + modalClass : '');
  modalContent.innerHTML = html;
  document.getElementById('modal').classList.add('show');
}

// ───── 流局 ─────
function showDrawScreen() {
  // オンラインの場合：再戦ボタン、CPUの場合：もう一度ボタン
  const isOnlineGame = isOnline();
  const html = `
    <div class="draw-screen">
      <h2>流  局</h2>
      <div class="stamp">荒 牌</div>
      <p>山牌が尽きました。誰も上がれませんでした。</p>
      <div class="modal-actions" style="justify-content:center;">
        <button class="action-btn" onclick="returnToTitle()">${isOnlineGame ? '終 了' : 'タイトルへ'}</button>
        <button class="action-btn primary" id="rematchBtn" onclick="${isOnlineGame ? 'requestRematch()' : 'restartGame()'}">${isOnlineGame ? '再 戦' : 'もう一度'}</button>
      </div>
      ${isOnlineGame ? '<div class="review-rematch-status" id="rematchStatus"></div>' : ''}
    </div>
  `;

}

// ───── 大宣言バナー ─────
function showDeclaration(text) {

  div.className = 'declaration-banner';
  div.textContent = text;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 1400);

// ───── モーダル ─────
function showModal(type) {
  if (type === 'rules') showRulesModal();
  else if (type === 'arrange') showArrangeModal();
}

  const html = `
    <h2>遊 び 方</h2>

    <p>麻雀の要領で牌を引いて捨てて、<strong>「2文字×1組 + 3文字×4組」の合計5組の言葉</strong>をいち早く揃えた人が勝ち！</p>

      <li>5組の言葉が揃えば <strong>「ツモ上がり」</strong> 宣言</li>

    </ul>

    </p>

    <h3>使う牌（全120個）</h3>
    <p>「を」を除く45音 × 各2個（90個）<br>濁点・半濁点・拗音・長音 30種 × 各1個（30個）</p>

function showArrangeModal() {
  // 手牌の並び替え（あいうえお順 / カスタム）
  const html = `
    <h2>手 牌 整 理</h2>
    <p>手牌を並び替えます。</p>
    <div class="modal-actions">
      <button class="action-btn" onclick="closeModal()">閉じる</button>
      <button class="action-btn primary" onclick="sortMyHand()">あいうえお順に並べる</button>
    </div>
  `;
  showModalWithHTML(html);
}

function sortMyHand() {
  // プール内のタイルだけをあいうえお順にソートする（スロット内は触らない）
  const me = getMe();
  const order = [...BASIC_KANA, ...SPECIAL_KANA];
  // hand配列を「順序を保ったまま」並び替え：プールのタイルだけ抽出してソートし、元の位置に戻す
  const poolIndices = [];
  const poolTiles = [];
  me.hand.forEach((t, i) => {
    if (t.slotId === 'pool' || !t.slotId) {
      poolIndices.push(i);
      poolTiles.push(t);
    }
  });
  poolTiles.sort((a, b) => order.indexOf(a.c) - order.indexOf(b.c));
  poolIndices.forEach((origIdx, k) => {
    me.hand[origIdx] = poolTiles[k];
  });
  closeModal();
  render();
}

function showModalWithHTML(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

function confirmReturnTitle() {
  if (confirm('ゲームを中断してタイトルに戻りますか？')) returnToTitle();
}

function returnToTitle() {
  closeModal();
  state = null;
  document.getElementById('gameScreen').classList.remove('active');
  document.getElementById('lobbyScreen').style.display = 'none';
  document.getElementById('titleScreen').style.display = 'flex';
  document.getElementById('logBox').style.display = 'none';
  document.getElementById('logBox').innerHTML = '';
  // PeerJS接続を全解除
  hostConns.forEach(hc => {
    if (hc.conn) { try { hc.conn.close(); } catch(e){} }
  });
  hostConns = [];
  lobbyMembers = [];
  if (conn) { try { conn.close(); } catch(e){} conn = null; }
  if (peer) { try { peer.destroy(); } catch(e){} peer = null; }
  window._guestMyIdx = null;
  window._guestMembers = null;
  window._pendingWin = null;
  window._rematchSet = null;
  hideOnlineMenu();
}

function restartGame() {
  closeModal();
  document.getElementById('logBox').innerHTML = '';
  // オンラインモードでは requestRematch を使うので呼ばれない想定
  if (state && (state.mode === 'online-host' || state.mode === 'online-guest')) {
    returnToTitle();
    return;
  }
  state = null;
  startCpuGame();
}

// ───── 友人対戦：再戦リクエスト ─────
function requestRematch() {
  if (!isOnline()) {
    restartGame();
    return;
  }
  const btn = document.getElementById('rematchBtn');
  if (btn) { btn.disabled = true; btn.textContent = '再戦リクエスト送信済み'; }
  window._myRematchClicked = true;

  if (isGuest()) {
    sendActionToHost({ type: 'rematch-request' });
    updateRematchProgress({ from: state.myIdx, requested: 1, need: state.players.length });
  } else {
    // ホスト自身が再戦を希望
    handleRematchRequest(null, state.myIdx);
  }
}

// ホスト：再戦リクエストを受信
function handleRematchRequest(c, fromIdx) {
  if (!isHost()) return;
  let idx = fromIdx;
  if (idx === undefined && c) {
    const hc = hostConns.find(h => h.conn === c);
    if (hc) idx = hc.playerIdx;
  }
  if (idx === undefined) return;
  if (!window._rematchSet) window._rematchSet = new Set();
  window._rematchSet.add(idx);

  const need = state.players.length;
  const requested = window._rematchSet.size;

  // 全員に進捗通知
  hostBroadcast({ type: 'rematch-progress', requested, need });
  updateRematchProgress({ requested, need });

  if (requested >= need) {
    // 全員再戦希望 → 新ゲーム開始
    window._rematchSet = null;
    hostStartRematch();
  }
}

function updateRematchProgress(data) {
  const status = document.getElementById('rematchStatus');
  if (status) {
    status.textContent = `再戦リクエスト：${data.requested} / ${data.need} 人`;
  }
}

function hostStartRematch() {
  // 各ゲストに rematch-start を送る
  hostConns.forEach(hc => {
    if (hc.conn && hc.conn.open) {
      try { hc.conn.send({ type: 'rematch-start', myIdx: hc.playerIdx }); } catch(e) {}
    }
  });
  closeModal();
  document.getElementById('logBox').innerHTML = '';
  state = null;
  startGame(lobbyMembers.length, { mode: 'online-host' });
}
