    }

    html += `
      <div class="review-player${isWinner?' winner':''}">
        <div class="review-player-header">
          ${p.name}
          ${isWinner ? '<span class="review-winner-badge">勝 者</span>' : ''}
        </div>
        ${meldsHtml}
        ${slotsHtml}
        ${poolHtml}
      </div>
    `;
  });

  html += `
      <div class="modal-actions" style="justify-content:center;margin-top:.8rem;">
        <button class="action-btn" onclick="returnToTitle()">終 了</button>
        <button class="action-btn primary" id="rematchBtn" onclick="requestRematch()">再 戦</button>
      </div>
      <div class="review-rematch-status" id="rematchStatus"></div>
    </div>
  `;

  showModalWithHTMLClass(html, 'review-modal');
  window._lastReviewData = reviewData;
  window._myRematchClicked = false;
}

function showModalWithHTMLClass(html, modalClass) {
  const modalContent = document.getElementById('modalContent');
  modalContent.className = 'modal' + (modalClass ? ' ' + modalClass : '');
  modalContent.innerHTML = html;
  document.getElementById('modal').classList.add('show');
}

function showDrawScreen() {
  const isOnlineGame = isOnline();
  const html = `
    <div class="draw-screen">
      <h2>流  局</h2>
      <div class="stamp">荒 牌</div>
      <p>山牌が尽きました。誰も上がれませんでした。</p>
      <div class="modal-actions" style="justify-content:center;">
        <button class="action-btn" onclick="returnToTitle()">${isOnlineGame ? '終 了' : 'タイトルへ'}</button>
        <button class="action-btn primary" id="rematchBtn" onclick="${isOnlineGame ? 'requestRematch()' : 'restartGame()'}">${isOnlineGame ? '再 戦' : 'もう一度'}</button>
      </div>
      ${isOnlineGame ? '<div class="review-rematch-status" id="rematchStatus"></div>' : ''}
    </div>
  `;
  showModalWithHTML(html);
}

function showDeclaration(text) {
  const div = document.createElement('div');
  div.className = 'declaration-banner';
  div.textContent = text;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 1400);
}

function showModal(type) {
  if (type === 'rules') showRulesModal();
  else if (type === 'arrange') showArrangeModal();
}

function showRulesModal() {
  const html = `
    <h2>遊 び 方</h2>
    <h3>ゲームの目的</h3>
    <p>麻雀の要領で牌を引いて捨てて、<strong>「2文字×1組 + 3文字×4組」の合計5組の言葉</strong>をいち早く揃えた人が勝ち！</p>

    <h3>基本の流れ</h3>
    <ul>
      <li>各プレイヤーに <strong>13個</strong> の牌が配られます</li>
      <li>自分の番が来たら <strong>1個ツモる</strong>（合計14個）</li>
      <li>5組の言葉が揃えば <strong>「ツモ上がり」</strong> 宣言</li>
      <li>揃わなければ <strong>1個捨てて</strong> 次の人へ</li>
    </ul>

    <h3>ポン</h3>
    <p>他の人が捨てた牌と <strong>自分の手牌2枚</strong> を組み合わせて <strong>3文字の言葉</strong> を作れる場合、「ポン」と宣言してその捨て牌をもらえます。3文字グループとして公開され、以後組み替え不可になります。ポン後は手牌から1枚捨てて自分の番が続きます。</p>

    <h3>カン</h3>
    <p>自分のターンで牌を引いた後、捨てる前に <strong>手牌から4枚以上</strong> を選んで <strong>4文字以上の言葉</strong> を作れる場合、「カン」と宣言できます。カンした牌は公開され組み替え不可。<br>カン成立後、<strong>(使った枚数 - 3) 枚を山から補充</strong> してから1枚捨てます。<br>例: 4枚カン→山から1枚補充／5枚カン→山から2枚補充。</p>

    <h3>ロン</h3>
    <p>他の人が捨てた牌が <strong>自分の上がり牌</strong> なら「ロン」と宣言して上がれます。</p>

    <h3>言葉の判定</h3>
    <p style="background:#f9f4e3;padding:.6rem;border-radius:4px;border-left:3px solid var(--vermillion);">
      ⚠ <strong>言葉が実在するかどうかは、プレイヤー同士で話し合って決めます。</strong>このゲームでは辞書チェックは行いません。固有名詞、外来語、方言など、参加者全員が納得すれば OK です。
    </p>

    <h3>使う牌（全120個）</h3>
    <p>「を」を除く45音 × 各2個（90個）<br>濁点・半濁点・拗音・長音 30種 × 各1個（30個）</p>

    <div class="modal-actions">
      <button class="action-btn primary" onclick="closeModal()">閉 じ る</button>
    </div>
  `;

}

function showArrangeModal() {
  const html = `
    <h2>手 牌 整 理</h2>
    <p>手牌を並び替えます。</p>
    <div class="modal-actions">
      <button class="action-btn" onclick="closeModal()">閉じる</button>
      <button class="action-btn primary" onclick="sortMyHand()">あいうえお順に並べる</button>
    </div>
  `;
  showModalWithHTML(html);
}

function sortMyHand() {
  const me = getMe();
  const order = [...BASIC_KANA, ...SPECIAL_KANA];
  const poolIndices = [];
  const poolTiles = [];
  me.hand.forEach((t, i) => {
    if (t.slotId === 'pool' || !t.slotId) {
      poolIndices.push(i);
      poolTiles.push(t);
    }
  });
  poolTiles.sort((a, b) => order.indexOf(a.c) - order.indexOf(b.c));
  poolIndices.forEach((origIdx, k) => {
    me.hand[origIdx] = poolTiles[k];
  });
  closeModal();
  render();
}

function showModalWithHTML(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

function confirmReturnTitle() {
  if (confirm('ゲームを中断してタイトルに戻りますか？')) returnToTitle();
}

function returnToTitle() {
  closeModal();
  state = null;
  document.getElementById('gameScreen').classList.remove('active');
  document.getElementById('lobbyScreen').style.display = 'none';
  document.getElementById('titleScreen').style.display = 'flex';
  document.getElementById('logBox').style.display = 'none';
  document.getElementById('logBox').innerHTML = '';
  hostConns.forEach(hc => {
    if (hc.conn) { try { hc.conn.close(); } catch(e){} }
  });
  hostConns = [];
  lobbyMembers = [];
  if (conn) { try { conn.close(); } catch(e){} conn = null; }
  if (peer) { try { peer.destroy(); } catch(e){} peer = null; }
  window._guestMyIdx = null;
  window._guestMembers = null;
  window._pendingWin = null;
  window._rematchSet = null;
  hideOnlineMenu();
}

function restartGame() {
  closeModal();
  document.getElementById('logBox').innerHTML = '';
  if (state && (state.mode === 'online-host' || state.mode === 'online-guest')) {
    returnToTitle();
    return;
  }
  state = null;
  startCpuGame();
}

function requestRematch() {
  if (!isOnline()) {
    restartGame();
    return;
  }
  const btn = document.getElementById('rematchBtn');
  if (btn) { btn.disabled = true; btn.textContent = '再戦リクエスト送信済み'; }
  window._myRematchClicked = true;

  if (isGuest()) {
    sendActionToHost({ type: 'rematch-request' });
    updateRematchProgress({ from: state.myIdx, requested: 1, need: state.players.length });
  } else {
    handleRematchRequest(null, state.myIdx);
  }
}

function handleRematchRequest(c, fromIdx) {
  if (!isHost()) return;
  let idx = fromIdx;
  if (idx === undefined && c) {
    const hc = hostConns.find(h => h.conn === c);
    if (hc) idx = hc.playerIdx;
  }
  if (idx === undefined) return;
  if (!window._rematchSet) window._rematchSet = new Set();
  window._rematchSet.add(idx);

  const need = state.players.length;
  const requested = window._rematchSet.size;

  hostBroadcast({ type: 'rematch-progress', requested, need });
  updateRematchProgress({ requested, need });

  if (requested >= need) {
    window._rematchSet = null;
    hostStartRematch();
  }
}

function updateRematchProgress(data) {
  const status = document.getElementById('rematchStatus');
  if (status) {
    status.textContent = `再戦リクエスト：${data.requested} / ${data.need} 人`;
  }
}

function hostStartRematch() {
  hostConns.forEach(hc => {
    if (hc.conn && hc.conn.open) {
      try { hc.conn.send({ type: 'rematch-start', myIdx: hc.playerIdx }); } catch(e) {}
    }
  });
  closeModal();
  document.getElementById('logBox').innerHTML = '';
  state = null;
  startGame(lobbyMembers.length, { mode: 'online-host' });
}

</script>
